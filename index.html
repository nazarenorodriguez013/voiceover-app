<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#6C63FF" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.json" />
<title>VoiceOver App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #6C63FF;
      --primary-dark: #5550d4;
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface2: #242440;
      --text: #e8e8ff;
      --text-muted: #8888bb;
      --success: #4ade80;
      --danger: #f87171;
      --radius: 14px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--surface);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid rgba(108,99,255,0.2);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header .logo {
      width: 38px;
      height: 38px;
      background: var(--primary);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    header h1 {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    header p {
      font-size: 0.72rem;
      color: var(--text-muted);
    }

    .tabs {
      display: flex;
      background: var(--surface);
      border-bottom: 1px solid rgba(108,99,255,0.15);
    }

    .tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    .page { display: none; flex: 1; flex-direction: column; overflow-y: auto; }
    .page.active { display: flex; }

    /* ─── GENERATE PAGE ─── */
    .gen-content {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      flex: 1;
    }

    .voice-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    label.field-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: block;
      margin-bottom: 6px;
    }

    select, textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid rgba(108,99,255,0.25);
      color: var(--text);
      border-radius: var(--radius);
      padding: 12px 14px;
      font-size: 0.92rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
      appearance: none;
    }

    select:focus, textarea:focus {
      border-color: var(--primary);
    }

    .select-wrapper {
      position: relative;
    }

    .select-wrapper::after {
      content: '▾';
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }

    textarea {
      min-height: 160px;
      resize: vertical;
      line-height: 1.5;
    }

    .char-count {
      text-align: right;
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: -10px;
    }

    /* Sliders */
    .slider-group { display: flex; flex-direction: column; gap: 4px; }
    .slider-header { display: flex; justify-content: space-between; align-items: center; }
    .slider-val { font-size: 0.8rem; font-weight: 700; color: var(--primary); }

    input[type=range] {
      width: 100%;
      accent-color: var(--primary);
      height: 4px;
    }

    /* Player card */
    .player-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px;
      border: 1px solid rgba(108,99,255,0.2);
    }

    .player-title {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .player-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .progress-bar {
      flex: 1;
      min-width: 100%;
      height: 5px;
      background: var(--surface2);
      border-radius: 99px;
      margin-top: 10px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 99px;
      width: 0%;
      transition: width 0.3s linear;
    }

    .btn {
      border: none;
      cursor: pointer;
      border-radius: var(--radius);
      font-weight: 700;
      font-family: inherit;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }

    .btn:active { transform: scale(0.96); }

    .btn-primary {
      background: var(--primary);
      color: #fff;
      padding: 14px 20px;
      font-size: 1rem;
      width: 100%;
    }

    .btn-primary:hover { background: var(--primary-dark); }

    .btn-icon {
      background: var(--surface2);
      color: var(--text);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .btn-icon.playing {
      background: var(--primary);
      color: #fff;
    }

    .btn-sm {
      background: var(--surface2);
      color: var(--text);
      padding: 9px 14px;
      font-size: 0.82rem;
      border-radius: 10px;
    }

    .btn-success {
      background: rgba(74,222,128,0.15);
      color: var(--success);
    }

    .btn-generate {
      padding: 16px;
      font-size: 1.05rem;
      letter-spacing: 0.3px;
      margin-top: auto;
    }

    /* Status */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 99px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .status-ready { background: rgba(74,222,128,0.15); color: var(--success); }
    .status-playing { background: rgba(108,99,255,0.2); color: var(--primary); }
    .status-error { background: rgba(248,113,113,0.15); color: var(--danger); }

    .pulse {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: currentColor;
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.7); }
    }

    /* ─── HISTORY PAGE ─── */
    .history-content {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .history-header h2 { font-size: 1rem; }

    .btn-clear {
      background: none;
      border: none;
      color: var(--danger);
      font-size: 0.8rem;
      cursor: pointer;
      font-family: inherit;
    }

    .history-item {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 14px;
      border: 1px solid rgba(108,99,255,0.15);
    }

    .history-item-text {
      font-size: 0.88rem;
      line-height: 1.4;
      margin-bottom: 10px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .history-item-meta {
      font-size: 0.72rem;
      color: var(--text-muted);
      display: flex;
      gap: 12px;
      margin-bottom: 10px;
    }

    .history-item-actions {
      display: flex;
      gap: 8px;
    }

    .empty-state {
      text-align: center;
      color: var(--text-muted);
      padding: 60px 20px;
      font-size: 0.9rem;
    }

    .empty-state .emoji { font-size: 3rem; margin-bottom: 12px; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 99px;
      font-size: 0.85rem;
      font-weight: 600;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      z-index: 100;
      white-space: nowrap;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .no-support {
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.3);
      color: var(--danger);
      padding: 12px 14px;
      border-radius: var(--radius);
      font-size: 0.83rem;
      text-align: center;
    }

    @media (max-width: 360px) {
      .voice-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">🎙️</div>
  <div>
    <h1>VoiceOver App</h1>
    <p>Texto a voz con descarga</p>
  </div>
</header>

<div class="tabs">
  <div class="tab active" data-tab="generate">✨ Generar</div>
  <div class="tab" data-tab="history">🕘 Historial</div>
</div>

<div class="page active" id="page-generate">
  <div class="gen-content">

    <div id="no-support" class="no-support" style="display:none">
      ⚠️ Tu navegador no soporta síntesis de voz. Usá Chrome o Safari.
    </div>

    <div id="debugPanel" style="display:none;background:#1a1a2e;border:1px solid #444;border-radius:10px;padding:12px;font-size:0.75rem;color:#aaa;line-height:1.6">
      <b style="color:#fff">Info de diagnóstico:</b><br>
      <span id="debugText"></span>
    </div>

    <div>
      <label class="field-label">Voz</label>
      <div class="select-wrapper">
        <select id="voiceSelect"></select>
      </div>
    </div>

    <div class="voice-row">
      <div class="slider-group">
        <div class="slider-header">
          <label class="field-label" style="margin:0">Velocidad</label>
          <span class="slider-val" id="rateVal">1.0x</span>
        </div>
        <input type="range" id="rateSlider" min="0.5" max="2" step="0.1" value="1" />
      </div>
      <div class="slider-group">
        <div class="slider-header">
          <label class="field-label" style="margin:0">Tono</label>
          <span class="slider-val" id="pitchVal">1.0</span>
        </div>
        <input type="range" id="pitchSlider" min="0.5" max="2" step="0.1" value="1" />
      </div>
    </div>

    <div>
      <label class="field-label">Texto</label>
      <textarea id="textInput" placeholder="Escribe o pegá el texto que quieras convertir en voz..."></textarea>
      <div class="char-count"><span id="charCount">0</span> caracteres</div>
    </div>

    <div class="player-card" id="playerCard" style="display:none">
      <div class="player-title">
        <span id="statusBadge" class="status-badge status-ready">
          <span class="pulse"></span>
          <span id="statusText">Listo</span>
        </span>
      </div>
      <div class="player-controls">
        <button class="btn btn-icon" id="playPauseBtn" title="Reproducir / Pausar">▶</button>
        <button class="btn btn-icon" id="stopBtn" title="Detener">⏹</button>
        <button class="btn btn-sm" id="downloadBtn">⬇ Descargar MP3</button>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <button class="btn btn-primary btn-generate" id="generateBtn">🎙️ Generar Voz</button>

  </div>
</div>

<div class="page" id="page-history">
  <div class="history-content">
    <div class="history-header">
      <h2>Historial</h2>
      <button class="btn-clear" id="clearHistoryBtn">Borrar todo</button>
    </div>
    <div id="historyList"></div>
  </div>
</div>

<div id="toast"></div>

<script>
  let voices = [];
  let currentUtterance = null;
  let isPlaying = false;
  let progressInterval = null;
  let keepAliveInterval = null;
  let speechStartTime = 0;
  let estimatedDuration = 0;

  const HISTORY_KEY = 'voiceover_history';

  const voiceSelect   = document.getElementById('voiceSelect');
  const textInput     = document.getElementById('textInput');
  const charCount     = document.getElementById('charCount');
  const rateSlider    = document.getElementById('rateSlider');
  const pitchSlider   = document.getElementById('pitchSlider');
  const rateVal       = document.getElementById('rateVal');
  const pitchVal      = document.getElementById('pitchVal');
  const generateBtn   = document.getElementById('generateBtn');
  const playPauseBtn  = document.getElementById('playPauseBtn');
  const stopBtn       = document.getElementById('stopBtn');
  const downloadBtn   = document.getElementById('downloadBtn');
  const playerCard    = document.getElementById('playerCard');
  const statusBadge   = document.getElementById('statusBadge');
  const statusText    = document.getElementById('statusText');
  const progressFill  = document.getElementById('progressFill');
  const historyList   = document.getElementById('historyList');
  const noSupport     = document.getElementById('no-support');

  // ── Init voces ──
  populateVoices();
  window.speechSynthesis.onvoiceschanged = populateVoices;

  function populateVoices() {
    const list = window.speechSynthesis.getVoices();
    voices = list;
    const prev = voiceSelect.value;
    voiceSelect.innerHTML = '';

    // Opción siempre disponible
    const addOpt = (val, label) => {
      const o = document.createElement('option');
      o.value = val; o.text = label;
      voiceSelect.appendChild(o);
    };

    addOpt('__es-US__', '♂ Español (predeterminado del sistema)');

    const esVoices = list.filter(v => v.lang.startsWith('es'));
    const enVoices = list.filter(v => v.lang.startsWith('en'));
    const rest     = list.filter(v => !v.lang.startsWith('es') && !v.lang.startsWith('en'));

    [...esVoices, ...enVoices, ...rest].forEach(v => {
      addOpt(v.name, `${v.name} (${v.lang})`);
    });

    // Restaurar selección o elegir primera voz en español
    if (prev && Array.from(voiceSelect.options).some(o => o.value === prev)) {
      voiceSelect.value = prev;
    } else if (esVoices.length > 0) {
      voiceSelect.value = esVoices[0].name;
    }
  }

  renderHistory();

  // ── Sliders ──
  rateSlider.addEventListener('input', () => {
    rateVal.textContent = parseFloat(rateSlider.value).toFixed(1) + 'x';
  });
  pitchSlider.addEventListener('input', () => {
    pitchVal.textContent = parseFloat(pitchSlider.value).toFixed(1);
  });

  textInput.addEventListener('input', () => {
    charCount.textContent = textInput.value.length;
  });

  // ── Generate ──
  generateBtn.addEventListener('click', () => {
    const text = textInput.value.trim();
    if (!text) { showToast('⚠️ Escribe algo primero'); return; }

    stopSpeech();
    playerCard.style.display = 'block';
    saveToHistory(text, voiceSelect.value || 'default', rateSlider.value, pitchSlider.value);
    startSpeech(text);
    showToast('🎙️ Generando voz...');
  });

  // ── Speech (Web Speech API nativa) ──
  function startSpeech(text) {
    window.speechSynthesis.cancel();

    const utt = new SpeechSynthesisUtterance(text);
    currentUtterance = utt;

    const sel = voiceSelect.value;
    if (sel && sel !== '__es-US__') {
      const v = voices.find(v => v.name === sel);
      if (v) utt.voice = v;
    }

    // Siempre setear lang — clave en Android para que elija voz correcta
    utt.lang   = (utt.voice ? utt.voice.lang : null) || 'es-US';
    utt.rate   = parseFloat(rateSlider.value);
    utt.pitch  = parseFloat(pitchSlider.value);
    utt.volume = 1;

    const words = text.split(/\s+/).length;
    estimatedDuration = (words / 150) * 60 * 1000 / utt.rate;

    utt.onstart = () => {
      isPlaying = true;
      speechStartTime = Date.now();
      updatePlayBtn();
      setStatus('playing', 'Reproduciendo...');
      startProgress();
      // Keep-alive: Android Chrome pausa síntesis en textos largos
      keepAliveInterval = setInterval(() => {
        if (!window.speechSynthesis.speaking) { clearInterval(keepAliveInterval); return; }
        if (window.speechSynthesis.paused) window.speechSynthesis.resume();
      }, 10000);
    };

    utt.onend = () => {
      isPlaying = false;
      clearInterval(keepAliveInterval);
      updatePlayBtn();
      setStatus('ready', 'Listo');
      progressFill.style.width = '100%';
      stopProgress();
      setTimeout(() => { progressFill.style.width = '0%'; }, 600);
    };

    utt.onerror = (e) => {
      isPlaying = false;
      clearInterval(keepAliveInterval);
      updatePlayBtn();
      stopProgress();
      if (e.error === 'not-allowed') {
        setStatus('error', 'Bloqueado');
        showToast('❌ Bloqueado por el navegador. Tocá la pantalla e intentá de nuevo.');
      } else if (e.error !== 'interrupted' && e.error !== 'canceled') {
        setStatus('error', 'Error: ' + e.error);
        showToast('❌ Error: ' + e.error);
      }
    };

    window.speechSynthesis.speak(utt);
  }

  function stopSpeech() {
    window.speechSynthesis.cancel();
    clearInterval(keepAliveInterval);
    isPlaying = false;
    currentUtterance = null;
    updatePlayBtn();
    setStatus('ready', 'Listo');
    stopProgress();
    progressFill.style.width = '0%';
  }

  // ──────────────────────────────────────────────
  // Controls
  // ──────────────────────────────────────────────
  playPauseBtn.addEventListener('click', () => {
    const text = textInput.value.trim();
    if (!isPlaying) {
      if (!text) return;
      startSpeech(text);
    } else {
      stopSpeech();
    }
  });

  stopBtn.addEventListener('click', stopSpeech);

  function updatePlayBtn() {
    playPauseBtn.textContent = isPlaying ? '⏸' : '▶';
    playPauseBtn.classList.toggle('playing', isPlaying);
  }

  function setStatus(type, text) {
    statusBadge.className = 'status-badge status-' + type;
    statusText.textContent = text;
  }

  // ──────────────────────────────────────────────
  // Progress bar
  // ──────────────────────────────────────────────
  function startProgress() {
    stopProgress();
    progressInterval = setInterval(() => {
      const elapsed = Date.now() - speechStartTime;
      const pct = Math.min((elapsed / estimatedDuration) * 100, 99);
      progressFill.style.width = pct + '%';
    }, 200);
  }

  function stopProgress() {
    if (progressInterval) { clearInterval(progressInterval); progressInterval = null; }
  }

  // ──────────────────────────────────────────────
  // Download (Web Audio API recording via MediaRecorder)
  // ──────────────────────────────────────────────
  downloadBtn.addEventListener('click', async () => {
    const text = textInput.value.trim();
    if (!text) { showToast('⚠️ No hay texto para descargar'); return; }

    showToast('⏳ Grabando audio, un momento...');
    downloadBtn.disabled = true;
    downloadBtn.textContent = '⏳ Grabando...';

    try {
      await recordAndDownload(text);
    } catch(e) {
      // Fallback: download as text file with instructions
      showToast('⚠️ Tu navegador no soporta grabación directa');
      fallbackDownload(text);
    } finally {
      downloadBtn.disabled = false;
      downloadBtn.textContent = '⬇ Descargar MP3';
    }
  });

  async function recordAndDownload(text) {
    // Use AudioContext + MediaStreamDestination to capture TTS
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const dest = ctx.createMediaStreamDestination();
    const mediaRecorder = new MediaRecorder(dest.stream, {
      mimeType: MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/ogg'
    });
    const chunks = [];

    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };

    return new Promise((resolve, reject) => {
      // Note: Web Speech API doesn't route through AudioContext on all browsers.
      // We use a loopback approach: capture system audio via getUserMedia if possible,
      // otherwise we fallback to a "silent" record + blob trick.
      mediaRecorder.start(100);

      const utt = new SpeechSynthesisUtterance(text);
      const selectedVoice = voices.find(v => v.name === voiceSelect.value);
      if (selectedVoice) utt.voice = selectedVoice;
      utt.rate  = parseFloat(rateSlider.value);
      utt.pitch = parseFloat(pitchSlider.value);

      utt.onend = () => {
        setTimeout(() => {
          mediaRecorder.stop();
          ctx.close();
        }, 300);
      };

      utt.onerror = (e) => {
        mediaRecorder.stop();
        ctx.close();
        reject(e);
      };

      mediaRecorder.onstop = () => {
        if (chunks.length === 0) { reject(new Error('no chunks')); return; }
        const blob = new Blob(chunks, { type: chunks[0].type });
        const ext  = blob.type.includes('webm') ? 'webm' : 'ogg';
        triggerDownload(blob, `voiceover_${Date.now()}.${ext}`);
        showToast('✅ Audio descargado');
        resolve();
      };

      speechSynthesis.speak(utt);
    });
  }

  function fallbackDownload(text) {
    // Fallback: download as .txt with instructions
    const blob = new Blob([text], { type: 'text/plain' });
    triggerDownload(blob, `texto_voiceover_${Date.now()}.txt`);
    showToast('📄 Texto descargado (tu navegador no soporta grabación de audio)');
  }

  function triggerDownload(blob, filename) {
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = filename;
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 5000);
  }

  // ──────────────────────────────────────────────
  // History
  // ──────────────────────────────────────────────
  function getHistory() {
    try { return JSON.parse(localStorage.getItem(HISTORY_KEY)) || []; }
    catch { return []; }
  }

  function saveToHistory(text, voice, rate, pitch) {
    const history = getHistory();
    history.unshift({
      id: Date.now(),
      text,
      voice,
      rate: parseFloat(rate),
      pitch: parseFloat(pitch),
      date: new Date().toLocaleString('es-AR'),
    });
    // Keep max 50
    if (history.length > 50) history.pop();
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    renderHistory();
  }

  function renderHistory() {
    const history = getHistory();
    if (history.length === 0) {
      historyList.innerHTML = `
        <div class="empty-state">
          <div class="emoji">🎙️</div>
          <p>Aún no generaste ninguna voz.<br>Ve a <b>Generar</b> para empezar.</p>
        </div>`;
      return;
    }

    historyList.innerHTML = history.map(item => `
      <div class="history-item" data-id="${item.id}">
        <div class="history-item-text">${escapeHtml(item.text)}</div>
        <div class="history-item-meta">
          <span>🎤 ${escapeHtml(item.voice || 'default')}</span>
          <span>⚡ ${item.rate}x</span>
          <span>📅 ${item.date}</span>
        </div>
        <div class="history-item-actions">
          <button class="btn btn-sm" onclick="playFromHistory(${item.id})">▶ Reproducir</button>
          <button class="btn btn-sm" onclick="loadFromHistory(${item.id})">✏️ Editar</button>
          <button class="btn btn-sm" style="color:var(--danger)" onclick="deleteHistory(${item.id})">🗑️</button>
        </div>
      </div>
    `).join('');
  }

  function playFromHistory(id) {
    const item = getHistory().find(h => h.id === id);
    if (!item) return;
    stopSpeech();

    // Set voice
    const voiceOpt = Array.from(voiceSelect.options).find(o => o.value === item.voice);
    if (voiceOpt) voiceSelect.value = item.voice;
    rateSlider.value = item.rate;
    pitchSlider.value = item.pitch;
    rateVal.textContent = item.rate.toFixed(1) + 'x';
    pitchVal.textContent = item.pitch.toFixed(1);

    // Switch tab
    switchTab('generate');
    textInput.value = item.text;
    charCount.textContent = item.text.length;
    playerCard.style.display = 'block';
    startSpeech(item.text);
  }

  function loadFromHistory(id) {
    const item = getHistory().find(h => h.id === id);
    if (!item) return;
    textInput.value = item.text;
    charCount.textContent = item.text.length;
    const voiceOpt = Array.from(voiceSelect.options).find(o => o.value === item.voice);
    if (voiceOpt) voiceSelect.value = item.voice;
    rateSlider.value = item.rate;
    pitchSlider.value = item.pitch;
    rateVal.textContent = item.rate.toFixed(1) + 'x';
    pitchVal.textContent = item.pitch.toFixed(1);
    switchTab('generate');
    showToast('✏️ Texto cargado');
  }

  function deleteHistory(id) {
    const history = getHistory().filter(h => h.id !== id);
    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    renderHistory();
    showToast('🗑️ Eliminado');
  }

  document.getElementById('clearHistoryBtn').addEventListener('click', () => {
    if (!confirm('¿Borrar todo el historial?')) return;
    localStorage.removeItem(HISTORY_KEY);
    renderHistory();
    showToast('🗑️ Historial borrado');
  });

  // ──────────────────────────────────────────────
  // Tabs
  // ──────────────────────────────────────────────
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => switchTab(tab.dataset.tab));
  });

  function switchTab(name) {
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
    document.querySelectorAll('.page').forEach(p => p.classList.toggle('active', p.id === 'page-' + name));
  }

  // ──────────────────────────────────────────────
  // Toast
  // ──────────────────────────────────────────────
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
  }

  // ──────────────────────────────────────────────
  // Helpers
  // ──────────────────────────────────────────────
  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showDebug(msg) {
    const panel = document.getElementById('debugPanel');
    const text  = document.getElementById('debugText');
    panel.style.display = 'block';
    text.innerHTML = msg;
  }
</script>
</body>
</html>
